<!DOCTYPE html>
<html lang="en" style="background:#19212e">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RoamDX</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#19212e">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="isl">
    <div id="isl-scroller">
      <div id="isl-inner">
        <div id="isl-content">

  <div id="app">
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo" id="logo" style="cursor:pointer">roamdx</span>
        <span id="status-dot" class="dot"></span>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div id="main-layout">
      <aside id="sidebar">
        <section>
          <h2>Sessions</h2>
          <ul id="session-list"></ul>
          <div class="input-row">
            <input type="text" id="new-session-name" placeholder="new session">
            <button id="new-session-btn" class="btn-sm">+</button>
          </div>
        </section>
        <hr>
        <section>
          <h2>Claude</h2>
          <textarea id="claude-prompt" placeholder="Send a task..." rows="3"></textarea>
          <div class="claude-actions">
            <button id="claude-send" class="btn-primary">Send</button>
            <button id="claude-mic" class="icon-btn mic-btn" title="Voice input">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
          </div>
        </section>
      </aside>

      <div id="content-area">
        <button id="back-btn" class="content-toggle content-toggle-left overlay-btn" title="Back to home">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <button id="fab-menu-btn" class="content-toggle content-toggle-right overlay-btn hidden" title="Actions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
          </svg>
        </button>

        <div id="home-view">
          <div id="home-content">
            <div id="home-header">
              <h1>Sessions</h1>
              <p id="home-count"></p>
            </div>
            <div id="home-grid"></div>
          </div>
        </div>

        <main id="terminal-container"></main>
        <div id="scroll-zone"></div>

        <div id="fab-menu" class="hidden">
          <button class="fab-item" data-action="fullscreen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
            <span>Fullscreen</span>
            <span class="fab-state" data-state-for="fullscreen"></span>
          </button>
          <button class="fab-item" data-action="hwkb">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 8L2 12l4 4"/><path d="M18 8l4 4-4 4"/><line x1="14.5" y1="4" x2="9.5" y2="20"/>
            </svg>
            <span>Hardware keyboard</span>
            <span class="fab-state" data-state-for="hwkb"></span>
          </button>
          <button class="fab-item" data-action="keys">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M10 12h.01M14 12h.01M18 12h.01M8 16h8"/>
            </svg>
            <span>Input bar</span>
            <span class="fab-state" data-state-for="keys"></span>
          </button>
        </div>

        <div id="quick-actions" class="hidden">
          <button id="quick-enter" class="overlay-btn" title="Enter">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/>
            </svg>
          </button>
          <button id="quick-mic" class="overlay-btn" title="Voice">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
        </div>

        <div id="mobile-keys">
          <button data-key="\x1b">Esc</button>
          <button data-key="\x09">Tab</button>
          <button data-mod="ctrl">Ctrl</button>
          <button data-key="\x1b[A">↑</button>
          <button data-key="\x1b[B">↓</button>
          <button data-key="\x1b[D">←</button>
          <button data-key="\x1b[C">→</button>
        </div>
      </div>
    </div>
  </div>

        </div>
      </div>
    </div>
  </div>

  <div id="auth-overlay">
    <div class="auth-card">
      <span class="logo" style="font-size:16px; color:var(--text)">roamdx</span>
      <input type="password" id="token-input" placeholder="access token" autofocus>
      <p id="auth-error"></p>
      <button id="token-submit" class="btn-primary">Connect</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script type="module" src="/lib/preview-colors.js"></script>
  <script type="module" src="/lib/scroll-physics.js"></script>
  <script type="module" src="/lib/keybindings-match.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/keybindings.js"></script>
  <script src="/js/scroll.js"></script>
  <script src="/js/upload.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/preview.js"></script>
  <script src="/js/voice.js"></script>
  <script src="/js/claude-panel.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
