<!DOCTYPE html>
<html lang="en" style="background:#19212e">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RoamDX</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#19212e">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="isl">
    <div id="isl-scroller">
      <div id="isl-inner">
        <div id="isl-content">

  <div id="app">
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo" id="logo" style="cursor:pointer">roamdx</span>
        <span id="status-dot" class="dot"></span>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div id="main-layout">
      <aside id="sidebar">
        <section>
          <h2>Sessions</h2>
          <ul id="session-list"></ul>
          <div class="input-row">
            <input type="text" id="new-session-name" placeholder="new session">
            <button id="new-session-btn" class="btn-sm">+</button>
          </div>
        </section>
        <hr>
        <section>
          <h2>Claude</h2>
          <textarea id="claude-prompt" placeholder="Send a task..." rows="3"></textarea>
          <div class="claude-actions">
            <button id="claude-send" class="btn-primary">Send</button>
            <button id="claude-mic" class="icon-btn mic-btn" title="Voice input">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
          </div>
        </section>
      </aside>

      <div id="content-area">
        <button id="back-btn" class="content-toggle content-toggle-left overlay-btn" title="Back to home">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <button id="fab-menu-btn" class="content-toggle content-toggle-right overlay-btn hidden" title="Actions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
          </svg>
        </button>

        <div id="home-view">
          <div id="home-content">
            <div id="home-header">
              <h1>Sessions</h1>
              <p id="home-count"></p>
            </div>
            <div id="home-grid"></div>
          </div>
        </div>

        <main id="terminal-container"></main>
        <div id="scroll-zone"></div>

        <div id="fab-menu" class="hidden">
          <button class="fab-item" data-action="fullscreen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
            <span>Fullscreen</span>
            <span class="fab-state" data-state-for="fullscreen"></span>
          </button>
          <button class="fab-item" data-action="hwkb">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 8L2 12l4 4"/><path d="M18 8l4 4-4 4"/><line x1="14.5" y1="4" x2="9.5" y2="20"/>
            </svg>
            <span>Hardware keyboard</span>
            <span class="fab-state" data-state-for="hwkb"></span>
          </button>
          <div class="fab-zoom" data-zoom="term">
            <span class="fab-zoom-label">Terminal</span>
            <button class="fab-zoom-btn" data-action="term-out">−</button>
            <button class="fab-zoom-value" data-action="term-reset">100%</button>
            <button class="fab-zoom-btn" data-action="term-in">+</button>
          </div>
          <div class="fab-zoom" data-zoom="app">
            <span class="fab-zoom-label">App</span>
            <button class="fab-zoom-btn" data-action="app-out">−</button>
            <button class="fab-zoom-value" data-action="app-reset">100%</button>
            <button class="fab-zoom-btn" data-action="app-in">+</button>
          </div>
        </div>

        <div id="quick-actions" class="hidden">
          <div id="cmd-grid">
            <div class="cmd-row" id="cmd-row-pane">
              <button class="overlay-btn" data-action="zoom" title="Toggle zoom">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="12" y2="21"/>
                </svg>
              </button>
              <button class="overlay-btn" data-action="close-pane" title="Close pane">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/>
                </svg>
              </button>
              <button class="overlay-btn" data-action="split-down" title="New pane below">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="9" y1="18" x2="15" y2="18"/>
                </svg>
              </button>
            </div>
            <div class="cmd-row" id="cmd-row-utils">
              <button class="overlay-btn" data-action="wake" title="Refresh">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
              </button>
              <button class="overlay-btn" data-action="paste" title="Paste from clipboard">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 2h6a1 1 0 0 1 1 1v2H8V3a1 1 0 0 1 1-1z"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                </svg>
              </button>
            </div>
            <div class="cmd-row" id="cmd-row-bottom">
              <button id="quick-bar-toggle" class="overlay-btn" title="Toggle cmd menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3z"/>
                </svg>
              </button>
              <div id="input-bar" class="hidden">
                <button class="overlay-btn" data-action="esc" title="Esc">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="19 7 13 13 19 19"/><polyline points="13 7 7 13 13 19"/>
                  </svg>
                </button>
                <button class="overlay-btn" data-action="tab" title="Tab">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="7 8 11 12 7 16"/><line x1="13" y1="6" x2="13" y2="18"/>
                  </svg>
                </button>
                <button class="overlay-btn" data-action="shift" title="Shift">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3l8 9h-5v9h-6v-9H4z"/>
                  </svg>
                </button>
                <button class="overlay-btn" data-action="ctrl" title="Ctrl">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 14 12 8 18 14"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div id="quick-stack">
            <button id="quick-enter" class="overlay-btn" title="Enter">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/>
              </svg>
            </button>
            <button id="quick-mic" class="overlay-btn" title="Voice">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

        </div>
      </div>
    </div>
  </div>

  <div id="debug-overlay" class="hidden"></div>

  <div id="auth-overlay">
    <div class="auth-card">
      <span class="logo" style="font-size:16px; color:var(--text)">roamdx</span>
      <input type="password" id="token-input" placeholder="access token" autofocus>
      <p id="auth-error"></p>
      <button id="token-submit" class="btn-primary">Connect</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
  <script type="module" src="/lib/preview-colors.js"></script>
  <script type="module" src="/lib/scroll-physics.js"></script>
  <script type="module" src="/lib/keybindings-match.js"></script>
  <script type="module" src="/lib/format.js"></script>
  <script type="module" src="/lib/input-mode.js"></script>
  <script type="module" src="/lib/popover.js"></script>
  <script type="module" src="/lib/tile.js"></script>
  <script type="module" src="/lib/input-bar.js"></script>
  <script type="module" src="/lib/home-nav.js"></script>
  <script type="module" src="/lib/global-keys.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/keybindings.js"></script>
  <script src="/js/scroll.js"></script>
  <script src="/js/upload.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/preview.js"></script>
  <script src="/js/voice.js"></script>
  <script src="/js/claude-panel.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
