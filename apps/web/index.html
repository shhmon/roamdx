<!DOCTYPE html>
<html lang="en" style="background:#19212e">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RoamDX</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo" id="logo" style="cursor:pointer">roamdx</span>
        <span id="status-dot" class="dot"></span>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div id="main-layout">
      <aside id="sidebar">
        <section>
          <h2>Sessions</h2>
          <ul id="session-list"></ul>
          <div class="input-row">
            <input type="text" id="new-session-name" placeholder="new session">
            <button id="new-session-btn" class="btn-sm">+</button>
          </div>
        </section>
        <hr>
        <section>
          <h2>Claude</h2>
          <textarea id="claude-prompt" placeholder="Send a task..." rows="3"></textarea>
          <div class="claude-actions">
            <button id="claude-send" class="btn-primary">Send</button>
            <button id="claude-mic" class="icon-btn mic-btn" title="Voice input">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
          </div>
        </section>
      </aside>

      <div id="content-area">
        <button id="back-btn" class="content-toggle content-toggle-left icon-btn" title="Back to home">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <button id="keys-btn" class="content-toggle icon-btn hidden" title="Toggle keys" style="right:8px; top:56px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="6" y2="12"/><line x1="10" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="14" y2="12"/><line x1="18" y1="12" x2="18" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/>
          </svg>
        </button>
        <button id="fullscreen-btn" class="content-toggle content-toggle-right icon-btn" title="Fullscreen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>

        <div id="home-view">
          <div id="home-content">
            <div id="home-header">
              <h1>Sessions</h1>
              <p id="home-count"></p>
            </div>
            <div id="home-grid"></div>
          </div>
        </div>

        <main id="terminal-container"></main>

        <div id="mobile-keys">
          <button data-key="\x1b">Esc</button>
          <button data-key="\x09">Tab</button>
          <button data-mod="ctrl">Ctrl</button>
          <button data-key="\x1b[A">↑</button>
          <button data-key="\x1b[B">↓</button>
          <button data-key="\x1b[D">←</button>
          <button data-key="\x1b[C">→</button>
          <span class="keys-spacer"></span>
          <button id="voice-btn" class="mic-btn" title="Voice input">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="auth-overlay">
    <div class="auth-card">
      <span class="logo" style="font-size:16px; color:var(--text)">roamdx</span>
      <input type="password" id="token-input" placeholder="access token" autofocus>
      <p id="auth-error"></p>
      <button id="token-submit" class="btn-primary">Connect</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/preview.js"></script>
  <script src="/js/voice.js"></script>
  <script src="/js/claude-panel.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
