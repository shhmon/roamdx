<!DOCTYPE html>
<html lang="en" style="background:#19212e">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RoamDX</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo">roamdx</span>
        <span id="status-dot" class="dot"></span>
      </div>
      <div class="topbar-right">
        <button id="fullscreen-btn" class="icon-btn" title="Fullscreen">
          <svg class="icon-expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          <svg class="icon-shrink" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="main-layout">
      <aside id="sidebar">
        <section>
          <h2>Sessions</h2>
          <ul id="session-list"></ul>
          <div class="input-row">
            <input type="text" id="new-session-name" placeholder="new session">
            <button id="new-session-btn" class="btn-sm">+</button>
          </div>
        </section>
        <hr>
        <section>
          <h2>Claude</h2>
          <textarea id="claude-prompt" placeholder="Send a task..." rows="3"></textarea>
          <button id="claude-send" class="btn-primary">Send</button>
        </section>
      </aside>

      <main id="terminal-container"></main>
    </div>

    <button id="exit-fullscreen" class="icon-btn" title="Exit fullscreen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
  </div>

  <div id="auth-overlay">
    <div class="auth-card">
      <span class="logo" style="font-size:16px; color:var(--text)">roamdx</span>
      <input type="password" id="token-input" placeholder="access token" autofocus>
      <p id="auth-error"></p>
      <button id="token-submit" class="btn-primary">Connect</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/claude-panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
